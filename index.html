<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>Battle Cats Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>

<body>

<h2>Battle Cats Converter</h2>

<input
type="file"
id="zipFile"
accept=".zip">

<br><br>

<button id="convert">
変換
</button>

<script>

document
.getElementById("convert")
.onclick = convert;

async function convert(){

    const file =
    document
    .getElementById("zipFile")
    .files[0];

    if(!file){

        alert("ZIPを選択してください");

        return;

    }

    const zip =
    await JSZip.loadAsync(file);

    const images = [];

    for (const name in zip.files) {

        if (
            name.endsWith(".png") ||
            name.endsWith(".jpg") ||
            name.endsWith(".jpeg")
        ) {

            images.push(name);

        }

    }
images.sort((a, b) => {

    const numA =
        parseInt(
            a.match(/\d+(?=\.[^.]+$)/)[0]
        );

    const numB =
        parseInt(
            b.match(/\d+(?=\.[^.]+$)/)[0]
        );

    return numA - numB;

});
    console.log(images);

    alert(images.length + "枚見つかりました！");

}

</script>

</body>

</html>
